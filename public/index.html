<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GameSeeker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
header{background:#161b22;padding:12px 20px;border-bottom:1px solid #30363d}
nav{display:flex;gap:16px;max-width:960px;margin:0 auto}
nav a{color:#58a6ff;text-decoration:none;font-size:14px;cursor:pointer}
nav a:hover{text-decoration:underline}
main{max-width:960px;margin:20px auto;padding:0 20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:16px}
.card img{width:100%;border-radius:4px;margin-bottom:8px}
.card h3{font-size:16px;margin-bottom:4px}
.reason{color:#8b949e;font-size:13px;margin-bottom:4px}
.score{color:#3fb950;font-weight:bold}
input,button{padding:8px 12px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e1e4e8;font-size:14px}
button{background:#238636;border-color:#238636;cursor:pointer}
button:hover{background:#2ea043}
button.danger{background:#da3633;border-color:#da3633}
table{width:100%;border-collapse:collapse}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid #30363d;font-size:14px}
th{color:#8b949e;font-weight:600}
.login-box{text-align:center;margin-top:80px}
</style>
</head>
<body>
<header id="header" style="display:none">
  <nav>
    <a onclick="navigate('/')">🏠 推荐</a>
    <a onclick="navigate('/library')">📚 游戏库</a>
    <a onclick="navigate('/search')">🔍 搜索</a>
    <a onclick="navigate('/subscriptions')">💰 订阅</a>
    <a onclick="navigate('/profile')">👤 个人</a>
  </nav>
</header>
<main id="main"></main>

<script type="module">
const main = document.getElementById('main')
const header = document.getElementById('header')
let user = null

async function checkAuth() {
  const resp = await fetch('/api/auth/status')
  const data = await resp.json()
  if (!data.loggedIn) {
    main.innerHTML = `<div class="login-box"><a href="/api/auth/steam"><img src="https://steamcommunity-a.akamaihd.net/public/images/signinthroughsteam/sits_01.png" alt="Sign in through Steam"></a></div>`
    return
  }
  user = data.user
  header.style.display = 'block'
  navigate(window.location.hash.slice(1) || '/')
}

window.navigate = function(path) {
  window.location.hash = path
  window.dispatchEvent(new HashChangeEvent('hashchange'))
}

async function renderHome() {
  const resp = await fetch('/api/recommendations')
  const data = await resp.json()
  const recs = data.recommendations || []
  if (!recs.length) { main.innerHTML = '<p>暂无推荐，请先同步游戏库</p>'; return }
  main.innerHTML = recs.map(r => `
    <div class="card">
      <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/${r.appid}/header.jpg" onerror="this.style.display='none'">
      <h3>${esc(r.name)}</h3>
      <p class="reason">${esc(r.reason || '')}</p>
      <span class="score">★ ${(r.score||0).toFixed(1)}</span>
    </div>
  `).join('')
}

async function renderLibrary(page = 1) {
  const sort = new URLSearchParams('page='+page+'&sort=playtime')
  const resp = await fetch('/api/library?' + sort)
  const data = await resp.json()
  main.innerHTML = `
    <h2 style="margin-bottom:16px">游戏库 (${data.total} 款)</h2>
    <table><thead><tr><th>名称</th><th>时长(h)</th><th>品类</th><th>评分</th></tr></thead><tbody>
    ${(data.games||[]).map(g => `
      <tr><td>${esc(g.name)}</td><td>${(g.playtime_hours||0).toFixed(1)}</td><td>${(g.genres||[]).slice(0,3).join(', ')}</td><td>${g.review_score||'-'}</td></tr>
    `).join('')}</tbody></table>
    <div style="margin-top:16px;display:flex;gap:8px">
      ${page > 1 ? `<button onclick="renderLibrary(${page-1})">上一页</button>` : ''}
      ${data.games?.length >= 50 ? `<button onclick="renderLibrary(${page+1})">下一页</button>` : ''}
    </div>`
}

async function renderSearch() {
  main.innerHTML = `<h2 style="margin-bottom:16px">搜索游戏</h2>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input id="search-input" placeholder="输入游戏名..." style="flex:1">
      <button onclick="doSearch()">搜索</button>
    </div>
    <div id="search-results"></div>`
}

window.doSearch = async function() {
  const q = document.getElementById('search-input').value.trim()
  if (!q) return
  const resp = await fetch('/api/search?q=' + encodeURIComponent(q))
  const data = await resp.json()
  const div = document.getElementById('search-results')
  div.innerHTML = (data.results||[]).map(r => `<div class="card"><h3>${esc(r.name)}</h3><p>appid: ${r.id}</p></div>`).join('') || '<p>未找到结果</p>'
}

async function renderSubscriptions() {
  const resp = await fetch('/api/subscriptions')
  const data = await resp.json()
  main.innerHTML = `<h2 style="margin-bottom:16px">降价订阅</h2>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input id="sub-name" placeholder="游戏名"><input id="sub-appid" placeholder="appid" type="number">
      <button onclick="addSub()">添加订阅</button>
    </div>
    ${(data.subscriptions||[]).map(s => `<div class="card"><h3>${esc(s.name)}</h3><p>appid: ${s.appid}</p><button class="danger" onclick="delSub(${s.id})">取消</button></div>`).join('') || '<p>暂无订阅</p>'}`
}

window.addSub = async function() {
  const name = document.getElementById('sub-name').value.trim()
  const appid = parseInt(document.getElementById('sub-appid').value, 10)
  await fetch('/api/subscriptions', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,appid})})
  renderSubscriptions()
}

window.delSub = async function(id) {
  await fetch('/api/subscriptions/'+id, {method:'DELETE'})
  renderSubscriptions()
}

function renderProfile() {
  main.innerHTML = `<h2 style="margin-bottom:16px">个人</h2>
    <div class="card">
      <p><b>昵称:</b> ${esc(user.personaname)}</p>
      <p><b>Steam ID:</b> ${esc(user.steamid)}</p>
      ${user.avatar ? `<img src="${esc(user.avatar)}" style="width:64px;border-radius:50%;margin-top:8px">` : ''}
      <br><button class="danger" onclick="logout()" style="margin-top:16px">退出登录</button>
    </div>`
}

window.logout = async function() {
  await fetch('/api/auth/logout', {method:'POST'})
  location.reload()
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

async function router() {
  const path = window.location.hash.slice(1) || '/'
  if (path === '/library') await renderLibrary()
  else if (path === '/search') await renderSearch()
  else if (path === '/subscriptions') await renderSubscriptions()
  else if (path === '/profile') renderProfile()
  else await renderHome()
}

window.addEventListener('hashchange', router)
checkAuth()
</script>
</body>
</html>
