<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GameSeeker Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#030712;color:#e2e8f0;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:40px 20px}
h1{font-size:1.8em;font-weight:800;background:linear-gradient(135deg,#a855f7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:24px;margin-bottom:20px}
.form-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.form-row input,.form-row select{flex:1;min-width:150px;padding:10px 14px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px}
.form-row input:focus{outline:none;border-color:#a855f7}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#a855f7,#3b82f6);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{opacity:.9}
.btn-sm{padding:6px 12px;font-size:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;text-align:left;border-bottom:1px solid #1e293b}
th{color:#94a3b8;font-size:12px;text-transform:uppercase;letter-spacing:1px}
td{font-size:14px}
.key-cell{color:#a855f7;font-family:monospace;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.val-cell{font-family:monospace;max-width:250px;overflow:hidden;text-overflow:ellipsis}
.actions{display:flex;gap:8px}
.status-bar{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:16px 24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.status-bar .stat{font-size:14px;color:#94a3b8}
.status-bar .stat strong{color:#e2e8f0}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 24px;border-radius:8px;color:#fff;font-size:14px;z-index:1000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-success{background:#059669}
.toast-error{background:#dc2626}
.password-input{width:100%;padding:14px 20px;background:#1e293b;border:1px solid #334155;border-radius:12px;color:#e2e8f0;font-size:16px;text-align:center;margin-bottom:16px}
.password-input:focus{outline:none;border-color:#a855f7}
.login-box{max-width:360px;margin:100px auto;text-align:center}
.login-box h2{margin-bottom:24px;font-size:1.4em}
.eye-btn{background:none;border:none;color:#94a3b8;cursor:pointer;padding:4px;font-size:14px}
.eye-btn:hover{color:#e2e8f0}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.empty{text-align:center;color:#64748b;padding:40px;font-size:14px}
.loading{text-align:center;color:#64748b;padding:20px}
.hidden{display:none}
.data-link{color:#3b82f6;text-decoration:none;font-size:13px}
.data-link:hover{text-decoration:underline}
.logout-link{color:#94a3b8;text-decoration:none;font-size:14px;cursor:pointer}
.logout-link:hover{color:#e2e8f0}
.cfg-label{min-width:140px;font-size:13px;color:#94a3b8;padding-top:10px;font-family:monospace}
.cfg-req{color:#dc2626;font-size:11px;padding-top:12px;min-width:32px}
.cfg-status{font-size:13px;color:#94a3b8;margin-left:12px}
select{flex:1;min-width:150px;padding:10px 14px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px}
select:focus{outline:none;border-color:#a855f7}
</style>
</head>
<body>
<div class="container" id="app">
  <div id="login-view" class="login-box">
    <h1>GameSeeker</h1>
    <h2>管理后台</h2>
    <input type="password" id="password-input" class="password-input" placeholder="输入管理员密码" autofocus onkeydown="if(event.key==='Enter')login()">
    <button class="btn btn-primary" onclick="login()" style="width:100%">登录</button>
    <p id="login-error" style="color:#dc2626;margin-top:12px;font-size:13px;display:none"></p>
  </div>
  <div id="admin-view" class="hidden">
    <div class="toolbar">
      <h1>GameSeeker Admin</h1>
      <span class="logout-link" onclick="logout()">退出登录</span>
    </div>
    <div class="card">
      <h3 style="margin-bottom:16px;font-size:16px">Telegram Bot</h3>
      <div class="form-row">
        <input type="password" id="tg-token" placeholder="Bot Token（从 @BotFather 获取）">
        <input type="text" id="tg-admin" placeholder="Admin Chat ID">
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="saveTelegram()">保存配置</button>
        <button class="btn btn-primary" onclick="setWebhook()">设置 Webhook</button>
        <button class="btn btn-primary" onclick="setCommands()" style="margin-left:8px">注册菜单</button>
      </div>
      <p id="tg-status" style="margin-top:8px;font-size:13px;color:#94a3b8"></p>
    </div>
    <div class="card">
      <h3 style="margin-bottom:16px;font-size:16px">🔤 中文名搜索</h3>
      <p style="font-size:13px;color:#94a3b8;margin-bottom:12px">Steam API 不支持中文搜索，在此添加中文名→Steam ID 映射</p>
      <div class="form-row">
        <input type="text" id="cn-name" placeholder="中文游戏名（如 泰拉瑞亚）" style="flex:1">
        <input type="number" id="cn-appid" placeholder="Steam App ID（如 105600）" style="width:140px">
        <button class="btn btn-primary" onclick="addChineseName()">添加</button>
      </div>
      <p id="cn-status" style="margin-top:8px;font-size:13px;color:#94a3b8"></p>
    </div>
    <div class="card">
      <h3 style="margin-bottom:16px;font-size:16px">Steam 配置</h3>
      <div class="form-row">
        <span class="cfg-label">STEAM_API_KEY</span>
        <input type="password" id="cfg-STEAM_API_KEY" placeholder="Steam Web API Key（https://steamcommunity.com/dev/apikey）">
        <span class="cfg-req">必填</span>
      </div>
      <div class="form-row">
        <span class="cfg-label">STEAM_USER_ID</span>
        <input type="text" id="cfg-STEAM_USER_ID" placeholder="Steam 用户 ID 或自定义 URL">
        <span class="cfg-req">必填</span>
      </div>
      <div class="form-row">
        <span class="cfg-label">STEAM_LANG</span>
        <input type="text" id="cfg-STEAM_LANG" placeholder="语言代码（默认 schinese）">
      </div>
      <button class="btn btn-primary" onclick="saveModule('steam')">保存 Steam 配置</button>
      <span id="cfg-steam-status" class="cfg-status"></span>
    </div>
    <div class="card">
      <h3 style="margin-bottom:16px;font-size:16px">AI 模型</h3>
      <div class="form-row">
        <span class="cfg-label">LLM_PROVIDER</span>
        <select id="cfg-LLM_PROVIDER">
          <option value="">选择提供商</option>
          <option value="gemini">Gemini</option>
          <option value="openai">OpenAI</option>
          <option value="deepseek">DeepSeek</option>
          <option value="qwen">通义千问</option>
        </select>
        <span class="cfg-req">必填</span>
      </div>
      <div class="form-row">
        <span class="cfg-label">LLM_API_KEY</span>
        <input type="password" id="cfg-LLM_API_KEY" placeholder="LLM API Key">
        <span class="cfg-req">必填</span>
      </div>
      <div class="form-row">
        <span class="cfg-label">LLM_API_BASE</span>
        <input type="text" id="cfg-LLM_API_BASE" placeholder="API 基础 URL（可选）">
      </div>
      <div class="form-row">
        <span class="cfg-label">LLM_MODEL</span>
        <input type="text" id="cfg-LLM_MODEL" placeholder="模型名（可选）">
      </div>
      <div class="form-row">
        <span class="cfg-label">RECOMMEND_K</span>
        <input type="number" id="cfg-RECOMMEND_K" placeholder="推荐数量（默认 200）">
      </div>
      <button class="btn btn-primary" onclick="saveModule('llm')">保存 AI 配置</button>
      <span id="cfg-llm-status" class="cfg-status"></span>
    </div>
    <div class="card">
      <h3 style="margin-bottom:16px;font-size:16px">其他配置</h3>
      <div class="form-row">
        <input type="text" id="new-key" placeholder="配置名称">
        <input type="text" id="new-value" placeholder="值">
        <button class="btn btn-primary" onclick="addConfig()">添加</button>
      </div>
      <div id="config-loading" class="loading">加载中...</div>
      <div id="config-empty" class="empty hidden">暂无其他配置</div>
      <div id="config-table-wrap" class="hidden">
        <table><thead><tr><th>配置项</th><th>值</th><th>操作</th></tr></thead><tbody id="config-tbody"></tbody></table>
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  const { headers: _, ...rest } = opts;
  const resp = await fetch(path, { ...rest, headers });
  return resp;
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function checkAuth() {
  const resp = await api('/admin/api/config');
  if (resp.ok) {
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('admin-view').classList.remove('hidden');
    loadConfigs();
  }
}
checkAuth();

async function login() {
  try {
    const password = document.getElementById('password-input').value;
    if (!password) { toast('请输入密码', 'error'); return; }
    const resp = await api('/admin/login', { method: 'POST', body: JSON.stringify({ password }) });
    if (resp.ok) {
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('admin-view').classList.remove('hidden');
      loadConfigs();
    } else {
      const err = await resp.json().catch(() => ({}));
      document.getElementById('login-error').textContent = err.error || '登录失败';
      document.getElementById('login-error').style.display = 'block';
    }
  } catch (e) {
    console.error('登录错误:', e);
    toast('网络错误: ' + e.message, 'error');
  }
}

async function logout() {
  await api('/admin/logout', { method: 'POST' });
  document.getElementById('login-view').classList.remove('hidden');
  document.getElementById('admin-view').classList.add('hidden');
}

const MODULES = { steam: ['STEAM_API_KEY', 'STEAM_USER_ID', 'STEAM_LANG'], llm: ['LLM_PROVIDER', 'LLM_API_KEY', 'LLM_API_BASE', 'LLM_MODEL', 'RECOMMEND_K'] };
const ALL_MODULE_KEYS = [].concat(...Object.values(MODULES));
const SENSITIVE_MODULE_KEYS = ['STEAM_API_KEY', 'LLM_API_KEY'];
const HIDDEN_KEYS = ['TELEGRAM', ...ALL_MODULE_KEYS];
let currentConfigs = {};

function setCfgVal(id, val, sensitive = false) {
  const el = document.getElementById(id);
  if (!el) return;
  el.value = sensitive ? '' : (val || '');
  if (sensitive && val) {
    el.placeholder = '已配置，留空表示不修改';
    el.dataset.configured = 'true';
  } else {
    delete el.dataset.configured;
  }
}

function renderModuleCards(configs) {
  const tgRaw = configs['TELEGRAM'];
  if (tgRaw) {
    try { const tg = JSON.parse(tgRaw.value); setCfgVal('tg-token', tg.token); setCfgVal('tg-admin', tg.adminChatId); } catch(e) {}
  }
  for (const key of MODULES.steam) setCfgVal('cfg-' + key, configs[key]?.value || '', SENSITIVE_MODULE_KEYS.includes(key) && !!configs[key]);
  for (const key of MODULES.llm) setCfgVal('cfg-' + key, configs[key]?.value || '', SENSITIVE_MODULE_KEYS.includes(key) && !!configs[key]);
}

function renderOtherConfigs(configs) {
  const loading = document.getElementById('config-loading');
  const empty = document.getElementById('config-empty');
  const tableWrap = document.getElementById('config-table-wrap');
  const tbody = document.getElementById('config-tbody');
  loading.classList.add('hidden');
  empty.classList.add('hidden');
  tableWrap.classList.add('hidden');
  tbody.innerHTML = '';
  const otherKeys = Object.keys(configs).filter(k => !HIDDEN_KEYS.includes(k));
  if (!otherKeys.length) { empty.classList.remove('hidden'); return; }
  tableWrap.classList.remove('hidden');
  for (const key of otherKeys) {
    const isSensitive = configs[key].sensitive;
    const masked = isSensitive ? '••••••••' : configs[key].value;
    const tr = document.createElement('tr');
    tr.innerHTML = '<td class="key-cell">' + esc(key) + '</td>' +
      '<td class="val-cell"><span id="val-' + esc(key) + '">' + esc(masked) + '</span>' +
      (isSensitive ? ` <button class="eye-btn" onclick="toggleShow('${esc(key)}')">👁</button>` : '') +
      '</td>' +
      `<td class="actions"><button class="btn btn-sm btn-danger" onclick="deleteConfig('${esc(key)}')">删除</button></td>`;
    tbody.appendChild(tr);
  }
}

async function loadConfigs() {
  const resp = await api('/admin/api/config');
  if (!resp.ok) { toast('加载失败', 'error'); return; }
  const configs = await resp.json();
  currentConfigs = configs;
  renderModuleCards(configs);
  renderOtherConfigs(configs);
}

async function saveModule(name) {
  const keys = MODULES[name];
  if (!keys) return;
  let saved = 0;
  for (const key of keys) {
    const val = (document.getElementById('cfg-' + key)?.value || '').trim();
    let resp;
    if (!val) {
      if (SENSITIVE_MODULE_KEYS.includes(key)) continue;
      if (!currentConfigs[key]) continue;
      resp = await api('/admin/api/config', { method: 'DELETE', body: JSON.stringify({ key }) });
    } else {
      resp = await api('/admin/api/config', { method: 'PUT', body: JSON.stringify({ key, value: val }) });
    }
    if (resp.ok) saved++;
  }
  const status = document.getElementById('cfg-' + name + '-status');
  if (status) { status.textContent = '已保存 ' + saved + ' 项'; setTimeout(() => status.textContent = '', 3000); }
  toast('已保存 ' + saved + ' 项');
  loadConfigs();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleShow(key) {
  const el = document.getElementById('val-' + key);
  if (el.dataset.revealed === 'true') {
    el.textContent = '••••••••';
    el.dataset.revealed = 'false';
  } else {
    api('/admin/api/config?reveal=' + encodeURIComponent(key)).then(r => r.json()).then(data => {
      el.textContent = data.value;
      el.dataset.revealed = 'true';
    });
  }
}

async function addConfig() {
  const key = document.getElementById('new-key').value.trim();
  const value = document.getElementById('new-value').value.trim();
  if (!key || !value) { toast('请输入配置名称和值', 'error'); return; }
  const resp = await api('/admin/api/config', { method: 'PUT', body: JSON.stringify({ key, value }) });
  if (resp.ok) {
    toast('配置已保存');
    document.getElementById('new-key').value = '';
    document.getElementById('new-value').value = '';
    loadConfigs();
  } else {
    toast('保存失败', 'error');
  }
}

async function deleteConfig(key) {
  if (!confirm('确定删除 ' + key + ' 吗？')) return;
  const resp = await api('/admin/api/config', { method: 'DELETE', body: JSON.stringify({ key }) });
  if (resp.ok) {
    toast('已删除');
    loadConfigs();
  } else {
    toast('删除失败', 'error');
  }
}

async function saveTelegram() {
  const token = document.getElementById('tg-token').value.trim();
  const adminChatId = document.getElementById('tg-admin').value.trim();
  if (!token || !adminChatId) { toast('请填写完整', 'error'); return; }
  const resp = await api('/admin/api/config', {
    method: 'PUT',
    body: JSON.stringify({ key: 'TELEGRAM', value: JSON.stringify({ token, adminChatId }) }),
  });
  if (resp.ok) {
    toast('Telegram 配置已保存');
    document.getElementById('tg-status').textContent = '✅ 已保存';
    loadConfigs();
  } else {
    toast('保存失败', 'error');
  }
}

async function setCommands() {
  const resp = await api('/api/bot/set-commands');
  const data = await resp.json();
  if (data.ok) {
    toast('菜单注册成功');
    document.getElementById('tg-status').textContent = '✅ 菜单已注册';
  } else {
    toast('菜单注册失败: ' + (data.description || '未知错误'), 'error');
  }
}

async function setWebhook() {
  const resp = await api('/api/bot/set-webhook');
  const data = await resp.json();
  if (data.ok) {
    toast('Webhook 设置成功');
    document.getElementById('tg-status').textContent = '✅ Webhook 已设置';
  } else {
    toast('Webhook 设置失败: ' + (data.description || '未知错误'), 'error');
  }
}

async function addChineseName() {
  const name = document.getElementById('cn-name');
  const appid = document.getElementById('cn-appid');
  if (!name.value || !appid.value) { toast('请填写游戏名和 App ID', 'error'); return; }
  const resp = await api('/api/bot/add-chinese-name', { method: 'POST', body: JSON.stringify({ name: name.value, appid: parseInt(appid.value) }) });
  const data = await resp.json();
  if (data.ok) {
    toast(`✅ 已添加: ${name.value} → ${appid.value}`);
    document.getElementById('cn-status').textContent = `✅ ${name.value} → ${appid.value}`;
    name.value = '';
    appid.value = '';
  } else {
    toast('添加失败: ' + (data.error || '未知错误'), 'error');
  }
}
</script>
</body>
</html>
