name = "gameseeker"
main = "worker/index.js"
compatibility_date = "2024-10-01"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

assets = { directory = "./public", binding = "ASSETS" }

# KV绑定
#[[kv_namespaces]]
#binding = "KV"
#id = ""
#preview_id = ""

[triggers]
crons = ["0 3 * * *", "30 3 * * 1", "0 4 * * *"]

[env.production]
[env.preview]
