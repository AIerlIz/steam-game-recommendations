name = "gameseeker"
main = "worker/index.ts"
compatibility_date = "2024-10-01"

assets = { directory = "./public", binding = "ASSETS" }

# KV绑定（过渡期：Telegram Bot 会话缓存 + 旧管线兼容层）
[[kv_namespaces]]
binding = "KV"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[triggers]
crons = ["0 3 * * *", "30 3 * * 1", "0 4 * * *"]

[env.production]
[[env.production.kv_namespaces]]
binding = "KV"

[[d1_databases]]
binding = "DB"
database_name = "gameseeker-db"
database_id = "placeholder"

[env.preview]
[[env.preview.kv_namespaces]]
binding = "KV"
