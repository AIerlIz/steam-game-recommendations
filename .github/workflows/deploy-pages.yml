name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:
    inputs:
      purge:
        description: '清空数据源，仅部署静态文件'
        type: boolean
        default: false
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 注入 PROXY_BASE
        run: sed -i "s|__PROXY_BASE__|${{ secrets.PROXY_BASE || 'https://cfproxy.aierliz.top' }}|g" index.html

      - name: 下载数据文件
        if: ${{ !inputs.purge }}
        uses: ./.github/actions/download-data
        with:
          files: 'games_detail.json library.json games.json'
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

